<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paiement Sécurisé KoMo</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        .amount-input { width: 100%; font-size: 28px; font-weight: bold; text-align: center; border: 2px solid #007bff; border-radius: 12px; padding: 10px; margin: 15px 0; box-sizing: border-box; color: #333; }
        .info-num { font-size: 13px; color: #666; margin-bottom: 5px; }
        .btn-pay { display: block; padding: 18px; border-radius: 15px; color: white; text-decoration: none; font-weight: bold; margin-top: 12px; transition: 0.2s; }
        .btn-pay:active { transform: scale(0.98); }
        .error { color: #dc3545; background: #fff5f5; padding: 20px; border-radius: 12px; border: 1px solid #feb2b2; }
    </style>
</head>
<body>

<div id="app" class="card">Vérification...</div>

<script>
    const MA_CLE = "fd2026!tg";
    const url = new URLSearchParams(window.location.search);
    
    const mt = url.get('mt');
    const n1 = url.get('n1');
    const id1 = url.get('id1');
    const n2 = url.get('n2');
    const id2 = url.get('id2');
    const s = url.get('s');

    function verifier() {
        const sigAttendue = btoa(`${n1}|${id1}|${n2}|${id2}|${MA_CLE}`).substring(0, 12);
        return s === sigAttendue;
    }

    const app = document.getElementById('app');

    if (!verifier()) {
        app.innerHTML = `<div class="error"><h3>🚫 Lien Invalide</h3><p>Les informations de réception ont été altérées. Contactez l'expéditeur.</p></div>`;
    } else {
        app.innerHTML = `
            <h2>Procéder au paiement</h2>
            <label style="font-size:12px; color:#888;">Vous pouvez ajuster le montant :</label>
            <input type="number" id="mtField" class="amount-input" value="${mt}">
            <div id="btns"></div>
        `;

        const field = document.getElementById('mtField');
        const btns = document.getElementById('btns');

        function dessiner() {
            const val = field.value || 0;
            let h = "";
            if(n1 && n1 !== "0") {
                const code = `*145*1*${val}*${n1}*1#`;
                h += `<div>
                        <div class="info-num">Numéro: ${n1} ${id1 ? '('+id1+')' : ''}</div>
                        <a href="tel:${code.replace('#', '%23')}" class="btn-pay" style="background:#007bff">🔵 T-Money</a>
                      </div>`;
            }
            if(n2 && n2 !== "0") {
                const code = `*155*1*1*${n2}*${n2}*${val}*1#`;
                h += `<div style="margin-top:20px;">
                        <div class="info-num">Numéro: ${n2} ${id2 ? '('+id2+')' : ''}</div>
                        <a href="tel:${code.replace('#', '%23')}" class="btn-pay" style="background:#ffc107; color:#333">🟡 Moov Money</a>
                      </div>`;
            }
            btns.innerHTML = h;
        }

        field.addEventListener('input', dessiner);
        dessiner();
    }
</script>
</body>
</html>

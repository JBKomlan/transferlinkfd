<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KoMo Pay - Console Admin</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 500px; margin: 20px auto; padding: 20px; background: #eef2f3; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .auth-zone { background: #fff5f5; border: 1px solid #feb2b2; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        label { display: block; margin-top: 10px; font-weight: bold; font-size: 13px; color: #555; }
        input { width: 100%; padding: 10px; margin-top: 5px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .net-section { border-left: 4px solid #ddd; padding-left: 15px; margin-top: 15px; background: #f9f9f9; padding-bottom: 10px; border-radius: 5px; }
        button { width: 100%; background: #2f855a; color: white; border: none; padding: 15px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; border-radius: 8px; }
        #result { display: none; margin-top: 20px; padding: 15px; background: #f0fff4; border: 1px solid #25D366; border-radius: 10px; text-align: center; }
        .wa-link { display: inline-block; background: #075E54; color: white; padding: 12px 20px; text-decoration: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center;">🛡️ KoMo Terminal</h2>
    
    <div class="auth-zone">
        <label>🔑 Code de Sécurité Admin</label>
        <input type="password" id="adminPass" placeholder="Tapez votre code ici">
    </div>

    <label>📞 WhatsApp Client</label>
    <input type="number" id="numClient" placeholder="228xxxx">

    <label>💰 Montant suggéré (FCFA)</label>
    <input type="number" id="montant" placeholder="Ex: 5000">

    <div class="net-section" style="border-color: #007bff;">
        <label>🔵 T-Money (Mixx)</label>
        <input type="number" id="n1" placeholder="Numéro de réception">
        <input type="text" id="id1" placeholder="Nom (ex: Jean P.)">
    </div>

    <div class="net-section" style="border-color: #ffc107;">
        <label>🟡 Moov (Flooz)</label>
        <input type="number" id="n2" placeholder="Numéro de réception">
        <input type="text" id="id2" placeholder="Nom (ex: Boutique KoMo)">
    </div>

    <button onclick="generer()">Générer le lien sécurisé</button>

    <div id="result">
        <p style="font-weight: bold;">Lien certifié prêt !</p>
        <div id="waArea"></div>
    </div>
</div>

<script>
    function generer() {
        const pass = document.getElementById('adminPass').value.trim();
        const MA_CLE = "fd2026!tg"; // Ton mot de passe en clair pour éviter tout bug

        if (pass !== MA_CLE) {
            alert("❌ Code incorrect.");
            return;
        }

        const cli = document.getElementById('numClient').value;
        const mt = document.getElementById('montant').value;
        const n1 = document.getElementById('n1').value || "0";
        const id1 = document.getElementById('id1').value || "";
        const n2 = document.getElementById('n2').value || "0";
        const id2 = document.getElementById('id2').value || "";

        if(!cli || !mt) return alert("Remplissez au moins le client et le montant.");

        // Signature pour protéger les numéros de réception
        const signature = btoa(encodeURIComponent(`${n1}|${id1}|${n2}|${id2}|${MA_CLE}`)).substring(0, 15);
        
        const params = new URLSearchParams({ mt, n1, id1, n2, id2, s: signature });
        const lien = window.location.href.replace('index.html', `transfer.html?${params.toString()}`);
        
        document.getElementById('waArea').innerHTML = `<a href="https://wa.me/${cli}?text=${encodeURIComponent(lien)}" target="_blank" class="wa-link">📲 Envoyer au client</a>`;
        document.getElementById('result').style.display = 'block';
    }
</script>
</body>
</html>

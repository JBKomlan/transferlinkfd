n<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KoMo Pay - Admin</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 450px; margin: 20px auto; padding: 20px; background: #f4f7f6; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .auth-box { background: #fff5f5; border: 1px solid #feb2b2; padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        label { display: block; margin-top: 12px; font-weight: bold; font-size: 14px; color: #4a5568; }
        input { width: 100%; padding: 12px; margin-top: 5px; border-radius: 10px; border: 1px solid #e2e8f0; box-sizing: border-box; }
        .net-row { border-left: 4px solid #cbd5e0; padding-left: 15px; margin-top: 15px; }
        button { width: 100%; background: #2f855a; color: white; border: none; padding: 16px; font-size: 17px; font-weight: bold; cursor: pointer; margin-top: 25px; border-radius: 12px; }
        #res { display: none; margin-top: 20px; padding: 15px; background: #f0fff4; border-radius: 12px; text-align: center; border: 1px solid #c6f6d5; }
        .wa-btn { display: inline-block; background: #25D366; color: white; padding: 12px 20px; text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center; margin-top:0;">🛡️ KoMo Terminal</h2>
    
    <div class="auth-box">
        <label>🔑 Clé de Sécurité Admin</label>
        <input type="password" id="pass" placeholder="Entrez votre code secret">
    </div>

    <label>📞 WhatsApp Client</label>
    <input type="number" id="cli" placeholder="228...">

    <label>💰 Montant (FCFA)</label>
    <input type="number" id="amt" placeholder="Ex: 10000">

    <div class="net-row" style="border-color: #007bff;">
        <label>🔵 Numéro Mixx (T-Money)</label>
        <input type="number" id="nmixx" placeholder="90xxxxxx">
    </div>

    <div class="net-row" style="border-color: #ffc107;">
        <label>🟡 Numéro Flooz (Moov)</label>
        <input type="number" id="nflooz" placeholder="98xxxxxx">
    </div>

    <button onclick="generer()">Générer le lien sécurisé</button>

    <div id="res">
        <p style="color: #276749; font-weight: bold; margin: 0;">Lien authentifié prêt !</p>
        <div id="waArea"></div>
    </div>
</div>

<script>
    const SECRET = "KOMO_PRO_2026"; // CHANGEZ CE CODE

    // Crée un hash court basé sur les données et la clé secrète
    function createSig(mt, n1, n2) {
        const str = `${mt}|${n1}|${n2}|${SECRET}`;
        return btoa(str).substring(0, 10); 
    }

    function generer() {
        const p = document.getElementById('pass').value;
        if(p !== SECRET) return alert("Accès refusé.");

        const cli = document.getElementById('cli').value;
        const mt = document.getElementById('amt').value;
        const n1 = document.getElementById('nmixx').value || "0";
        const n2 = document.getElementById('nflooz').value || "0";

        if(!cli || !mt || (n1==="0" && n2==="0")) return alert("Infos manquantes.");

        const sig = createSig(mt, n1, n2);
        const link = `payer.html?mt=${mt}&n1=${n1}&n2=${n2}&s=${sig}`;
        
        const fullLink = window.location.href.replace('index.html', link);
        const msg = `Lien de paiement sécurisé (${mt} F) : ${fullLink}`;
        
        document.getElementById('waArea').innerHTML = `<a href="https://wa.me/${cli}?text=${encodeURIComponent(msg)}" target="_blank" class="wa-btn">Envoyer via WhatsApp</a>`;
        document.getElementById('res').style.display = 'block';
    }
</script>
</body>
</html>
